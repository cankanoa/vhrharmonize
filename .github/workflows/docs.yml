name: Publish Documentation

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish docs for (e.g., v1.2.3)"
        required: false

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Install Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          channels: conda-forge
          conda-remove-defaults: true

      - name: Create Conda environment for docs
        run: |
          conda create --name docs_env python=3.12 pip "gdal=3.11" "proj>=9.3" --override-channels -c conda-forge -v

      - name: Activate environment and install docs dependencies
        shell: bash -l {0}
        run: |
          conda activate docs_env
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build MkDocs site
        shell: bash -l {0}
        run: |
          conda activate docs_env
          mkdocs build --strict -f docs/mkdocs.yml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          cname: vhrharmonize.sefa.ai
