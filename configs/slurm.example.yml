provider: vhr-worldview # Provider runner to stage.
provider_config: configs/worldview.example.yml # Local provider YAML to rewrite for Slurm.
log_file: configs/slurm.example.log.yml # Generated file-to-file staging log.

ssh_host: koa.its.hawaii.edu
ssh_user: milo

remote_output_dir: /mnt/lustre/koa/scratch/vhrharmonize/runs/{run_id}/output # Non-temp outputs.
remote_log_dir: /mnt/lustre/koa/scratch/vhrharmonize/runs/{run_id}/logs # Slurm/stdout logs.
remote_temp_dir: /mnt/lustre/koa/scratch/vhrharmonize/runs/{run_id}/tmp # Inputs and $temp outputs.
remote_reference_dir: /mnt/lustre/koa/scratch/vhrharmonize/references # Shared reference files.

slurm_start_file: configs/worldview.example.sbatch # Uploaded then submitted with sbatch.

# Provider YAML keys to upload. Only upload keys that are set.
provider_upload_keys:
  - input_file_glob # Spacial case: input_file_glob uploads matched WorldView source files plus companions.
  - group_by_basename # Spacial caase: group_by_basename uploads only literal file: entries.
  - dem_file_path
  - existing_flaash_input
  - existing_mul_ortho_input
  - existing_pan_ortho_input
  - orthorectification_rpc_refinement_geojson
  - alignment_fixed_image
  - match_global_regression_vector_mask
  - match_local_block_adjustment_vector_mask
  - match_voronoi_center_seamline_aoi_path
  - match_voronoi_center_seamline_vector_mask
  - match_weighted_seamline_input_polygons
  - match_mask_rasters_vector_mask
  - match_global_regression_load_adjustments
  - match_local_block_adjustment_load_block_maps
